<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; background: #0f0f13; color: #f0f0f0; font-family: -apple-system, sans-serif; padding: 16px; }
    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .logo-icon { width: 28px; height: 28px; background: #6366f1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; color: white; }
    .logo-name { font-weight: 600; font-size: 14px; }
    .status { font-size: 12px; color: #9ca3af; margin-bottom: 16px; padding: 8px 12px; background: #1a1a24; border-radius: 8px; border: 1px solid #2a2a3a; }
    .status.recording { color: #f87171; border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.1); }
    input { width: 100%; padding: 8px 12px; background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 8px; color: #f0f0f0; font-size: 12px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #6366f1; }
    button { width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: 0.2s; }
    #btn-record { background: #6366f1; color: white; }
    #btn-record:hover { background: #4f46e5; }
    #btn-record.recording { background: #ef4444; }
    #btn-record.recording:hover { background: #dc2626; }
    #timer { text-align: center; font-size: 24px; font-family: monospace; color: #ef4444; margin: 12px 0; display: none; }
    #app-url { font-size: 11px; color: #6b7280; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">V</div>
    <div class="logo-name">VoiceNote AI</div>
  </div>

  <div id="status" class="status">Ready to record</div>
  <div id="timer">0:00</div>

  <input type="text" id="meeting-title" placeholder="Meeting title (optional)" />

  <button id="btn-record">Start Recording</button>

  <div id="app-url">Opens in VoiceNote AI app</div>

  <script src="popup.js"></script>
</body>
</html>
